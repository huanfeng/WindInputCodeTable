schema:
  id: chuangma_pinyin
  name: "创码拼音"
  icon_label: "创"
  version: "1.0"
  author: "群友"
  description: "创码+拼音混合输入方案，创码优先，拼音补充"

engine:
  type: mixed
  mixed:
    primary_schema: chuangma
    secondary_schema: pinyin
    min_pinyin_length: 2
    codetable_weight_boost: 10000000
    show_source_hint: true
  filter_mode: smart

learning:
  auto_learn:
    enabled: false
  freq:
    enabled: false
    protect_top_n: 3
  temp_max_entries: 5000
  temp_promote_count: 3
