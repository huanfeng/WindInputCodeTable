schema:
  id: tiger
  name: "虎字"
  icon_label: "字"
  version: "1.0"
  author: "群友"
  description: "虎字秃版输入方案"

engine:
  type: codetable
  codetable:
    max_code_length: 4
    auto_commit_unique: false
    clear_on_empty_max: false
    # dedup_candidates: true
    top_code_commit: true
    punct_commit: true
    show_code_hint: true
    single_code_input: false
    candidate_sort_mode: frequency
    z_key_repeat: true
    temp_pinyin:
      enabled: true
      schema: pinyin
  filter_mode: smart

dictionaries:
  - id: tiger_main
    path: "tiger/tiger.dict.yaml"
    type: rime_codetable
    default: true
    weight_spec:
      median: 10
      max: 890
      min: 5
      mode: linear

learning:
  auto_learn:
    enabled: false
  freq:
    enabled: false
    protect_top_n: 3

encoder:
  max_word_length: 10
  rules:
    - length_equal: 2
      formula: "AaAbBaBb"
    - length_equal: 3
      formula: "AaBaCaCb"
    - length_in_range: [4, 10]
      formula: "AaBaCaZa"
