schema:
  id: tiger_pinyin
  name: "虎字拼音"
  icon_label: "中"
  version: "1.0"
  author: "群友"
  description: "虎字+拼音混合输入方案，虎字优先，拼音补充"

engine:
  type: mixed
  mixed:
    primary_schema: tiger
    secondary_schema: pinyin
    min_pinyin_length: 2
    codetable_weight_boost: 10000000
    show_source_hint: true
    z_key_repeat: true
  filter_mode: smart

learning:
  auto_learn:
    enabled: false
  freq:
    enabled: false
    protect_top_n: 3
  temp_max_entries: 5000
  temp_promote_count: 3
