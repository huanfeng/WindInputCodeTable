[schema]
id = "tiger_pinyin"
name = "虎字拼音"
icon_label = "中"
version = "1.0"
author = "群友"
description = "虎字+拼音混合输入方案，虎字优先，拼音补充"

[engine]
type = "mixed"

# 仅引擎固定参数（方案构成 + 内部权重基线）；融合策略走全局 [schema.mix]。
[engine.mixed]
primary_schema = "tiger"
secondary_schema = "pinyin"
codetable_weight_boost = 10000000
