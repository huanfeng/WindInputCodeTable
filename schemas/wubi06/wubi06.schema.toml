[schema]
id = "wubi06"
name = "五笔06"
icon_label = "五"
version = "1.0"
author = "群友"
description = "五笔06版输入方案"

[engine]
type = "codetable"

# 仅引擎固定参数；行为/调频/造词/临时拼音等用户可配项走全局 [schema.codetable] 与 [input.temp_pinyin]。
[engine.codetable]
max_code_length = 4
base_sort = "weight"

[[dictionaries]]
id = "wubi06_main"
path = "wubi06/wubi06_cidian.dict.yaml"
type = "rime_codetable"
default = true
