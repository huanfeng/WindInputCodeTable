schema:
  id: wubi06
  name: "五笔06"
  icon_label: "五"
  version: "1.0"
  author: "群友"
  description: "五笔06版输入方案"

engine:
  type: codetable
  codetable:
    auto_commit_unique: false
    candidate_sort_mode: frequency
    clear_on_empty_max: false
    dedup_candidates: true
    max_code_length: 4
    punct_commit: true
    show_code_hint: true
    single_code_input: false
    skip_single_char_freq: true
    temp_pinyin:
      enabled: true
      schema: pinyin
    top_code_commit: true
    z_key_repeat: true
  filter_mode: smart

dictionaries:
  - id: wubi06_main
    path: "wubi06/wubi06_cidian.dict.yaml"
    type: rime_codetable
    default: true

learning:
  auto_learn:
    enabled: false
  freq:
    enabled: false
    protect_top_n: 3
